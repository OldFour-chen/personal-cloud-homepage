<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHome Media Center</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.96);
      --line: #dbe4f0;
      --text: #10233f;
      --muted: #60738d;
      --brand: #1677ff;
      --brand-deep: #0f5fd6;
      --danger: #dc2626;
      --shadow: 0 18px 42px rgba(16, 35, 63, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(22, 119, 255, 0.14), transparent 34%),
        radial-gradient(circle at top right, rgba(15, 157, 88, 0.1), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: 28px auto;
    }

    .hero, .panel, .modal-card {
      background: var(--panel);
      border: 1px solid rgba(219, 228, 240, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero, .panel { padding: 24px; }
    .hero { margin-bottom: 20px; }
    .hero h1 { margin: 0 0 10px; font-size: 34px; }
    .hero p { margin: 0; line-height: 1.7; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .field { display: grid; gap: 8px; margin-bottom: 14px; }
    .field label { font-size: 14px; font-weight: 700; color: var(--muted); }

    .field input, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: rgba(22, 119, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
    }

    .actions, .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar {
      justify-content: space-between;
      margin-bottom: 18px;
    }

    button, .link-btn {
      border: none;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover, .link-btn:hover { transform: translateY(-1px); }
    .primary { background: var(--brand); color: #fff; }
    .primary:hover { background: var(--brand-deep); }
    .secondary { background: #edf4ff; color: var(--brand-deep); }
    .danger { background: #fff1f2; color: var(--danger); }

    .status, .hint {
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
    }

    .status {
      background: #f7fbff;
      border: 1px solid #d9e9ff;
      min-height: 56px;
    }

    .hint {
      background: #fbfcfe;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters select {
      min-width: 140px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .asset-list {
      display: grid;
      gap: 16px;
    }

    .asset-card {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
    }

    .thumb {
      width: 180px;
      height: 124px;
      border-radius: 16px;
      background: linear-gradient(135deg, #eef5ff, #f8fbff);
      border: 1px solid #e5edf7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--muted);
      text-align: center;
      padding: 12px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meta h3 {
      margin: 0 0 10px;
      font-size: 18px;
      word-break: break-all;
    }

    .chips, .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chips { margin-bottom: 10px; }

    .chip {
      background: #edf4ff;
      color: var(--brand-deep);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }

    .empty {
      padding: 32px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      text-align: center;
      color: var(--muted);
      background: #fff;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.55);
    }

    .modal.open { display: flex; }
    .modal-card { max-width: min(1100px, 100%); max-height: 92vh; padding: 18px; }
    .modal-card img, .modal-card iframe {
      max-width: 100%;
      max-height: calc(92vh - 80px);
      border: 0;
      border-radius: 14px;
      background: #fff;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .shell { width: calc(100% - 20px); margin: 20px auto; }
      .asset-card { grid-template-columns: 1fr; }
      .thumb { width: 100%; height: 200px; }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>CloudHome Media Center</h1>
      <p>统一管理 CloudHome CMS v2 的图片、PDF 和通用文件。所有资源通过 OSS 上传，最终统一落到 `media_assets`。</p>
    </section>

    <div class="layout">
      <section class="panel">
        <h2>上传资源</h2>

        <div class="field">
          <label for="adminToken">管理 Token</label>
          <input id="adminToken" type="password" placeholder="请输入后台登录后返回的 token">
        </div>

        <div class="field">
          <label for="mediaType">资源类型</label>
          <select id="mediaType">
            <option value="image">image</option>
            <option value="pdf">pdf</option>
            <option value="file">file</option>
          </select>
        </div>

        <div class="field">
          <label for="mediaCategory">资源分类</label>
          <select id="mediaCategory">
            <option value="life">life</option>
            <option value="skill">skill</option>
            <option value="competition">competition</option>
            <option value="project">project</option>
          </select>
        </div>

        <div class="field">
          <label for="relatedModule">关联模块</label>
          <select id="relatedModule">
            <option value="experience">experience</option>
            <option value="skill">skill</option>
            <option value="competition">competition</option>
            <option value="home">home</option>
          </select>
        </div>

        <div class="field">
          <label for="mediaFile">选择文件</label>
          <input id="mediaFile" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf">
        </div>

        <div class="actions">
          <button id="uploadBtn" class="primary" type="button">开始上传</button>
          <a class="link-btn secondary" href="admin.html">返回后台</a>
        </div>

        <div id="statusBox" class="status">请选择文件并填写上传信息。</div>
        <div class="hint">5 秒内同名且同大小文件会被后端拒绝；按钮也会做前端防抖。图片支持预览，PDF 支持点击阅读。</div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>媒体列表</h2>
            <p style="margin:8px 0 0;color:var(--muted);">按 type / category 筛选，支持删除、预览与复制 OSS URL。</p>
          </div>
          <div class="filters">
            <select id="filterType">
              <option value="">全部类型</option>
              <option value="image">image</option>
              <option value="pdf">pdf</option>
              <option value="file">file</option>
            </select>
            <select id="filterCategory">
              <option value="">全部分类</option>
              <option value="life">life</option>
              <option value="skill">skill</option>
              <option value="competition">competition</option>
              <option value="project">project</option>
            </select>
            <button id="refreshBtn" class="secondary" type="button">刷新列表</button>
          </div>
        </div>
        <div id="assetList" class="asset-list">
          <div class="empty">正在加载媒体列表...</div>
        </div>
      </section>
    </div>
  </div>

  <div id="previewModal" class="modal">
    <div class="modal-card">
      <div class="modal-top">
        <strong id="previewTitle">预览</strong>
        <button id="closePreviewBtn" class="secondary" type="button">关闭</button>
      </div>
      <div id="previewBody"></div>
    </div>
  </div>

  <script>
    var STORAGE_KEY = "cloudhome_admin_token";
    var LAST_UPLOAD_AT = 0;

    var adminTokenInput = document.getElementById("adminToken");
    var mediaTypeInput = document.getElementById("mediaType");
    var mediaCategoryInput = document.getElementById("mediaCategory");
    var relatedModuleInput = document.getElementById("relatedModule");
    var mediaFileInput = document.getElementById("mediaFile");
    var uploadBtn = document.getElementById("uploadBtn");
    var refreshBtn = document.getElementById("refreshBtn");
    var filterTypeInput = document.getElementById("filterType");
    var filterCategoryInput = document.getElementById("filterCategory");
    var assetList = document.getElementById("assetList");
    var statusBox = document.getElementById("statusBox");
    var previewModal = document.getElementById("previewModal");
    var previewTitle = document.getElementById("previewTitle");
    var previewBody = document.getElementById("previewBody");

    adminTokenInput.value = localStorage.getItem(STORAGE_KEY) || "";
    adminTokenInput.addEventListener("input", function () {
      localStorage.setItem(STORAGE_KEY, adminTokenInput.value.trim());
    });

    function setStatus(message, tone) {
      statusBox.textContent = message;
      statusBox.style.borderColor = tone === "error" ? "#ffd6d6" : tone === "success" ? "#cfeeda" : "#d9e9ff";
      statusBox.style.background = tone === "error" ? "#fff7f7" : tone === "success" ? "#f4fff7" : "#f7fbff";
      statusBox.style.color = tone === "error" ? "#b42318" : tone === "success" ? "#0f9d58" : "#294462";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatSize(size) {
      if (!Number.isFinite(size) || size < 0) return "-";
      if (size < 1024) return size + " B";
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
      return (size / (1024 * 1024)).toFixed(2) + " MB";
    }

    async function parseJsonSafe(response) {
      try {
        return await response.json();
      } catch (error) {
        return {};
      }
    }

    function getHeaders() {
      var token = adminTokenInput.value.trim();
      if (!token) throw new Error("请先输入管理 Token");
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      };
    }

    async function uploadSelectedFile() {
      var file = mediaFileInput.files[0];
      if (!file) {
        setStatus("请先选择文件。", "error");
        return;
      }
      if (Date.now() - LAST_UPLOAD_AT < 5000) {
        setStatus("5 秒内请勿重复点击上传。", "error");
        return;
      }
      LAST_UPLOAD_AT = Date.now();

      uploadBtn.disabled = true;
      var originalText = uploadBtn.textContent;
      uploadBtn.textContent = "上传中...";
      try {
        var payload = {
          filename: file.name,
          content_type: file.type || (mediaTypeInput.value === "pdf" ? "application/pdf" : "application/octet-stream"),
          size: file.size,
          type: mediaTypeInput.value,
          category: mediaCategoryInput.value,
          related_module: relatedModuleInput.value
        };

        setStatus("正在申请上传地址...", "info");
        var initResponse = await fetch("/api/media/init-upload", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify(payload)
        });
        var initData = await parseJsonSafe(initResponse);
        if (!initResponse.ok) {
          throw new Error(initData.error || initData.detail || "初始化上传失败");
        }

        setStatus("正在上传到 OSS...", "info");
        var uploadResponse = await fetch(initData.upload_url, {
          method: "PUT",
          headers: { "Content-Type": payload.content_type },
          body: file
        });
        if (!uploadResponse.ok) {
          throw new Error("上传到 OSS 失败");
        }

        setStatus("正在写入媒体记录...", "info");
        var completeResponse = await fetch("/api/media/complete-upload", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({
            filename: file.name,
            object_key: initData.object_key,
            url: initData.public_url,
            content_type: payload.content_type,
            size: file.size,
            type: payload.type,
            category: payload.category,
            related_module: payload.related_module
          })
        });
        var completeData = await parseJsonSafe(completeResponse);
        if (!completeResponse.ok) {
          throw new Error(completeData.detail || "媒体记录写入失败");
        }

        mediaFileInput.value = "";
        setStatus("上传完成，媒体中心已同步。", "success");
        await loadAssets();
      } catch (error) {
        setStatus(error.message || "上传失败", "error");
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = originalText;
      }
    }

    async function loadAssets() {
      try {
        var params = new URLSearchParams();
        if (filterTypeInput.value) params.set("type", filterTypeInput.value);
        if (filterCategoryInput.value) params.set("category", filterCategoryInput.value);
        var response = await fetch("/api/media/list?" + params.toString());
        var data = await parseJsonSafe(response);
        if (!response.ok) {
          throw new Error(data.detail || "获取媒体列表失败");
        }
        renderAssets(Array.isArray(data) ? data : []);
      } catch (error) {
        assetList.innerHTML = '<div class="empty">' + escapeHtml(error.message || "获取媒体列表失败") + "</div>";
      }
    }

    function renderAssets(items) {
      if (!items.length) {
        assetList.innerHTML = '<div class="empty">当前筛选条件下暂无媒体资源。</div>';
        return;
      }
      assetList.innerHTML = items.map(function (item) {
        var isImage = item.type === "image";
        var isPdf = item.type === "pdf";
        var preview = isImage
          ? '<img src="' + escapeHtml(item.url) + '" alt="' + escapeHtml(item.filename) + '">'
          : (isPdf ? "<div>PDF 预览</div>" : "<div>FILE</div>");
        return ''
          + '<article class="asset-card">'
          + '  <div class="thumb">' + preview + '</div>'
          + '  <div class="meta">'
          + '    <h3>' + escapeHtml(item.filename) + '</h3>'
          + '    <div class="chips">'
          + '      <span class="chip">' + escapeHtml(item.type || "-") + '</span>'
          + '      <span class="chip">' + escapeHtml(item.category || "-") + '</span>'
          + '      <span class="chip">' + escapeHtml(item.related_module || "-") + '</span>'
          + '      <span class="chip">' + escapeHtml(formatSize(Number(item.size || 0))) + '</span>'
          + '    </div>'
          + '    <p>创建时间：' + escapeHtml(item.created_at || "-") + '</p>'
          + '    <p>Object Key：' + escapeHtml(item.object_key || "-") + '</p>'
          + '    <p>OSS URL：' + escapeHtml(item.url || "-") + '</p>'
          + '    <div class="inline-actions">'
          + '      <button class="secondary preview-btn" type="button" data-type="' + escapeHtml(item.type) + '" data-url="' + escapeHtml(item.url) + '" data-name="' + escapeHtml(item.filename) + '">预览</button>'
          + '      <a class="link-btn secondary" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">' + (isPdf ? "点击阅读" : "打开资源") + '</a>'
          + '      <button class="secondary copy-btn" type="button" data-url="' + escapeHtml(item.url) + '">复制 URL</button>'
          + '      <button class="danger delete-btn" type="button" data-id="' + escapeHtml(item.id) + '">删除</button>'
          + '    </div>'
          + '  </div>'
          + '</article>';
      }).join("");
    }

    function openPreview(name, type, url) {
      previewTitle.textContent = name || "预览";
      previewBody.innerHTML = type === "image"
        ? '<img src="' + escapeHtml(url) + '" alt="' + escapeHtml(name) + '">'
        : type === "pdf"
          ? '<iframe src="' + escapeHtml(url) + '"></iframe>'
          : '<p>该文件类型暂不支持站内预览，请使用“打开资源”。</p>';
      previewModal.classList.add("open");
    }

    function closePreview() {
      previewModal.classList.remove("open");
      previewBody.innerHTML = "";
    }

    async function copyUrl(url) {
      try {
        await navigator.clipboard.writeText(url);
        setStatus("URL 已复制。", "success");
      } catch (error) {
        setStatus("复制失败，请手动复制。", "error");
      }
    }

    async function deleteAsset(id) {
      try {
        var response = await fetch("/api/media/delete?id=" + encodeURIComponent(id), {
          method: "DELETE",
          headers: getHeaders()
        });
        var data = await parseJsonSafe(response);
        if (!response.ok) {
          throw new Error(data.detail || "删除失败");
        }
        setStatus("媒体资源已删除。", "success");
        await loadAssets();
      } catch (error) {
        setStatus(error.message || "删除失败", "error");
      }
    }

    uploadBtn.addEventListener("click", uploadSelectedFile);
    refreshBtn.addEventListener("click", loadAssets);
    filterTypeInput.addEventListener("change", loadAssets);
    filterCategoryInput.addEventListener("change", loadAssets);
    document.getElementById("closePreviewBtn").addEventListener("click", closePreview);
    previewModal.addEventListener("click", function (event) {
      if (event.target === previewModal) closePreview();
    });
    assetList.addEventListener("click", function (event) {
      var previewBtn = event.target.closest(".preview-btn");
      if (previewBtn) {
        openPreview(previewBtn.dataset.name || "", previewBtn.dataset.type || "", previewBtn.dataset.url || "");
        return;
      }
      var copyBtn = event.target.closest(".copy-btn");
      if (copyBtn) {
        copyUrl(copyBtn.dataset.url || "");
        return;
      }
      var deleteBtn = event.target.closest(".delete-btn");
      if (deleteBtn && confirm("确认删除这个媒体资源吗？")) {
        deleteAsset(deleteBtn.dataset.id || "");
      }
    });

    loadAssets();
  </script>
</body>
</html>
