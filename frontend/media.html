<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>媒体资源管理</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.95);
      --line: #dbe4f0;
      --text: #10233f;
      --muted: #5f728c;
      --brand: #1677ff;
      --brand-deep: #0f5fd6;
      --ok: #0f9d58;
      --warn: #d97706;
      --shadow: 0 18px 42px rgba(16, 35, 63, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(22, 119, 255, 0.14), transparent 34%),
        radial-gradient(circle at top right, rgba(15, 157, 88, 0.1), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid rgba(219, 228, 240, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(22, 119, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover {
      background: var(--brand-deep);
    }

    .secondary {
      background: #edf4ff;
      color: var(--brand-deep);
    }

    .status,
    .config-box {
      margin-top: 16px;
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.7;
      font-size: 14px;
    }

    .status {
      background: #f7fbff;
      border: 1px solid #d9e9ff;
      min-height: 56px;
    }

    .config-box {
      background: #fbfcfe;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .asset-list {
      display: grid;
      gap: 16px;
    }

    .asset-card {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .thumb {
      width: 140px;
      height: 100px;
      border-radius: 14px;
      background: linear-gradient(135deg, #eef5ff, #f8fbff);
      border: 1px solid #e5edf7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meta h3 {
      margin: 0 0 8px;
      font-size: 18px;
      word-break: break-all;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      background: #edf4ff;
      color: var(--brand-deep);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 9px 14px;
      background: #f3f8ff;
      color: var(--brand-deep);
      font-weight: 700;
      text-decoration: none;
      font-size: 13px;
    }

    .empty {
      padding: 28px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      text-align: center;
      color: var(--muted);
      background: #fff;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: calc(100% - 20px);
        margin: 20px auto;
      }

      .hero,
      .panel {
        border-radius: 18px;
      }

      .asset-card {
        grid-template-columns: 1fr;
      }

      .thumb {
        width: 100%;
        height: 180px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>阿里云 OSS 媒体资源管理</h1>
      <p>这个页面用于给个人主页上传图片和 PDF。前端先向后端申请预签名地址，再直接 PUT 到 OSS，最后回写 SQLite 记录。</p>
    </section>

    <div class="layout">
      <section class="panel">
        <h2>上传资源</h2>

        <div class="field">
          <label for="adminToken">管理员口令</label>
          <input id="adminToken" type="password" placeholder="请输入 ADMIN_TOKEN">
        </div>

        <div class="field">
          <label for="category">资源分类</label>
          <select id="category">
            <option value="experience">experience</option>
            <option value="life">life</option>
            <option value="skills">skills</option>
            <option value="project">project</option>
            <option value="document">document</option>
            <option value="other">other</option>
          </select>
        </div>

        <div class="field">
          <label for="mediaFile">选择文件</label>
          <input id="mediaFile" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf">
        </div>

        <div class="actions">
          <button class="secondary" type="button" id="checkConfigBtn">检查 OSS 配置</button>
          <button class="primary" type="button" id="uploadBtn">开始上传</button>
        </div>

        <div class="config-box" id="configBox">尚未检查配置。</div>
        <div class="status" id="statusBox">请选择文件并填写管理员口令。</div>
        <div class="hint">允许格式：JPG、PNG、WEBP、PDF。图片最大 10MB，PDF 最大 20MB。管理员口令会保存在当前浏览器的 localStorage 中，便于重复操作。</div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>最近上传</h2>
            <p>列表按最新上传时间倒序展示。</p>
          </div>
          <button class="secondary" type="button" id="refreshBtn">刷新列表</button>
        </div>

        <div class="asset-list" id="assetList">
          <div class="empty">正在加载媒体记录...</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const adminTokenInput = document.getElementById("adminToken");
    const categorySelect = document.getElementById("category");
    const mediaFileInput = document.getElementById("mediaFile");
    const statusBox = document.getElementById("statusBox");
    const configBox = document.getElementById("configBox");
    const assetList = document.getElementById("assetList");
    const uploadBtn = document.getElementById("uploadBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const checkConfigBtn = document.getElementById("checkConfigBtn");

    const STORAGE_KEY = "media_admin_token";

    adminTokenInput.value = localStorage.getItem(STORAGE_KEY) || "";
    adminTokenInput.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, adminTokenInput.value.trim());
    });

    function setStatus(message, tone) {
      statusBox.textContent = message;
      statusBox.style.borderColor = tone === "error" ? "#ffd6d6" : tone === "success" ? "#cfeeda" : "#d9e9ff";
      statusBox.style.background = tone === "error" ? "#fff7f7" : tone === "success" ? "#f4fff7" : "#f7fbff";
      statusBox.style.color = tone === "error" ? "#b42318" : tone === "success" ? "#0f9d58" : "#294462";
    }

    function getAdminHeaders() {
      const token = adminTokenInput.value.trim();
      if (!token) {
        throw new Error("请先输入管理员口令");
      }
      return {
        "Content-Type": "application/json",
        "x-admin-token": token
      };
    }

    function formatSize(size) {
      if (!Number.isFinite(size) || size < 0) return "-";
      if (size < 1024) return size + " B";
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
      return (size / (1024 * 1024)).toFixed(2) + " MB";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function parseJsonSafe(response) {
      try {
        return await response.json();
      } catch (error) {
        return {};
      }
    }

    async function checkConfig() {
      try {
        setStatus("正在检查 OSS 配置...", "info");
        const response = await fetch("/api/admin/media/config-check", {
          headers: {
            "x-admin-token": adminTokenInput.value.trim()
          }
        });
        const data = await parseJsonSafe(response);

        if (!response.ok) {
          throw new Error(data.detail || "配置检查失败");
        }

        configBox.textContent = [
          "oss_configured: " + data.oss_configured,
          "bucket: " + (data.bucket || "-"),
          "endpoint: " + (data.endpoint || "-")
        ].join(" | ");

        setStatus(data.oss_configured ? "OSS 配置完整，可以开始上传。" : "OSS 配置尚未完整，请先检查服务器 .env。", data.oss_configured ? "success" : "error");
      } catch (error) {
        configBox.textContent = "配置检查失败";
        setStatus(error.message || "配置检查失败", "error");
      }
    }

    async function loadAssets() {
      try {
        const response = await fetch("/api/admin/media", {
          headers: {
            "x-admin-token": adminTokenInput.value.trim()
          }
        });
        const data = await parseJsonSafe(response);

        if (!response.ok) {
          throw new Error(data.detail || "获取媒体列表失败");
        }

        renderAssets(Array.isArray(data) ? data : []);
      } catch (error) {
        assetList.innerHTML = `<div class="empty">${escapeHtml(error.message || "获取媒体列表失败")}</div>`;
      }
    }

    function renderAssets(items) {
      if (!items.length) {
        assetList.innerHTML = '<div class="empty">No uploaded media yet.</div>';
        return;
      }

      assetList.innerHTML = items.map(item => {
        const isImage = String(item.content_type || "").startsWith("image/");
        const isPdf = item.content_type === "application/pdf";
        const preview = isImage
          ? `<img src="${escapeHtml(item.url)}" alt="${escapeHtml(item.filename)}">`
          : isPdf
            ? "<div>PDF file</div>"
            : "<div>Media file</div>";

        return `
          <article class="asset-card">
            <div class="thumb">${preview}</div>
            <div class="meta">
              <h3>${escapeHtml(item.filename)}</h3>
              <div class="chips">
                <span class="chip">${escapeHtml(item.category || "uncategorized")}</span>
                <span class="chip">${escapeHtml(item.content_type || "-")}</span>
                <span class="chip">${escapeHtml(formatSize(Number(item.size || 0)))}</span>
              </div>
              <p>Created At: ${escapeHtml(item.created_at || "-")}</p>
              <p>Object Key: ${escapeHtml(item.object_key || "-")}</p>
              <p>URL: ${escapeHtml(item.url || "-")}</p>
              <div class="inline-actions">
                ${isPdf ? `<a class="link-btn" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Open PDF</a>` : ""}
                ${isImage ? `<a class="link-btn" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Open Image</a>` : ""}
                <button class="secondary copy-url-btn" type="button" data-url="${escapeHtml(item.url)}">Copy URL</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function copyUrl(url) {
      try {
        await navigator.clipboard.writeText(url);
        setStatus("URL copied to clipboard.", "success");
      } catch (error) {
        setStatus("Copy failed. Please copy it manually.", "error");
      }
    }

    async function uploadSelectedFile() {
      uploadBtn.disabled = true;
      const originalText = uploadBtn.textContent;
      uploadBtn.textContent = "上传中...";
      try {
        const file = mediaFileInput.files[0];
        if (!file) {
          throw new Error("Please choose a file first.");
        }

        const headers = getAdminHeaders();
        const fileHashBuffer = await crypto.subtle.digest("SHA-256", await file.arrayBuffer());
        const fileHash = Array.from(new Uint8Array(fileHashBuffer)).map(item => item.toString(16).padStart(2, "0")).join("");
        const payload = {
          filename: file.name,
          content_type: file.type,
          size: file.size,
          category: categorySelect.value,
          file_hash: fileHash
        };

        setStatus("Requesting presigned upload URL...", "info");

        const initResponse = await fetch("/api/admin/media/init-upload", {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        });
        const initData = await parseJsonSafe(initResponse);

        if (!initResponse.ok) {
          throw new Error(initData.detail || "Init upload failed.");
        }

        setStatus("Presigned URL created. Uploading to OSS...", "info");

        const uploadResponse = await fetch(initData.upload_url, {
          method: "PUT",
          headers: {
            "Content-Type": file.type
          },
          body: file
        });

        if (!uploadResponse.ok) {
          throw new Error("Upload to OSS failed.");
        }

        setStatus("OSS upload succeeded. Saving media record...", "info");

        const completeResponse = await fetch("/api/admin/media/complete-upload", {
          method: "POST",
          headers,
          body: JSON.stringify({
            filename: file.name,
            object_key: initData.object_key,
            url: initData.public_url,
            content_type: file.type,
            size: file.size,
            category: categorySelect.value
          })
        });
        const completeData = await parseJsonSafe(completeResponse);

        if (!completeResponse.ok) {
          throw new Error(completeData.detail || "Saving media record failed.");
        }

        mediaFileInput.value = "";
        setStatus("Upload complete. Media record saved to SQLite.", "success");
        await loadAssets();
      } catch (error) {
        setStatus(error.message || "Upload failed.", "error");
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = originalText;
      }
    }

    checkConfigBtn.addEventListener("click", checkConfig);
    uploadBtn.addEventListener("click", uploadSelectedFile);
    refreshBtn.addEventListener("click", loadAssets);
    assetList.addEventListener("click", event => {
      const button = event.target.closest(".copy-url-btn");
      if (!button) return;
      copyUrl(button.dataset.url || "");
    });

    loadAssets();
  </script>
</body>
</html>
