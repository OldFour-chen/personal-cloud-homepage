name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Block sensitive files
        shell: bash
        run: |
          set -euo pipefail

          env_files="$(find . -path './.git' -prune -o -type f \( -name '.env' -o -name '*.env' \) ! -name '.env.example' ! -path './backend/.env.example' -print)"
          if [[ -n "${env_files}" ]]; then
            echo "Sensitive env files detected:"
            printf '%s\n' "${env_files}"
            exit 1
          fi

          db_files="$(find . -path './.git' -prune -o -type f \( -name 'site.db' -o -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' \) -print)"
          if [[ -n "${db_files}" ]]; then
            echo "Database files should not be committed:"
            printf '%s\n' "${db_files}"
            exit 1
          fi

      - name: Check large files
        shell: bash
        run: |
          set -euo pipefail
          large_files="$(find . -path './.git' -prune -o -type f -size +100M -print)"
          if [[ -n "${large_files}" ]]; then
            echo "Files larger than 100MB detected:"
            printf '%s\n' "${large_files}"
            exit 1
          fi

      - name: Validate Docker Compose
        if: ${{ hashFiles('backend/docker-compose.yml') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f backend/.env.example ]]; then
            cp backend/.env.example backend/.env
          elif [[ ! -f backend/.env ]]; then
            printf '%s\n' \
              'OPENAI_API_KEY=dummy' \
              'OPENAI_BASE_URL=https://example.com' \
              'AI_MODEL=dummy' \
              'ADMIN_TOKEN=dummy' \
              'ADMIN_PASSWORD=dummy' \
              'ADMIN_EMAIL=dummy@example.com' \
              'SMTP_HOST=smtp.example.com' \
              'SMTP_PORT=587' \
              'SMTP_USER=dummy' \
              'SMTP_PASSWORD=dummy' \
              > backend/.env
          fi
          docker compose -f backend/docker-compose.yml config >/dev/null

      - name: Compile backend Python
        if: ${{ hashFiles('backend/**/*.py', 'backend/*.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t py_files < <(find backend -type f -name '*.py' ! -path '*/venv/*' ! -path '*/__pycache__/*')
          if [[ "${#py_files[@]}" -gt 0 ]]; then
            python -m py_compile "${py_files[@]}"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare server scripts directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/personal-cloud-homepage/scripts
            mkdir -p /opt/personal-cloud-homepage/security-reports
            mkdir -p /opt/personal-cloud-homepage/backups
            mkdir -p /opt/personal-cloud-homepage/ops-requests

      - name: Sync ops scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: scripts/*
          target: /opt/personal-cloud-homepage
          strip_components: 0
          overwrite: true

      - name: Ensure scripts are executable and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            chmod +x /opt/personal-cloud-homepage/scripts/security_audit.sh
            chmod +x /opt/personal-cloud-homepage/scripts/backup_to_oss.sh
            chmod +x /opt/personal-cloud-homepage/scripts/ops_runner.sh
            /opt/personal-cloud-homepage/scripts/deploy.sh

            cd /opt/personal-site-api

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker-compose"
            else
              COMPOSE_CMD="sudo docker compose"
            fi

            $COMPOSE_CMD build api1 api2
            sudo docker rm -f personal-api-1 personal-api-2 || true
            $COMPOSE_CMD up -d --no-deps api1 api2

            sudo docker exec personal-api-1 ls -l /opt/personal-cloud-homepage/security-reports/latest_report.json
            sudo docker exec personal-api-2 ls -l /opt/personal-cloud-homepage/security-reports/latest_report.json

            if command -v systemctl >/dev/null 2>&1; then
              sudo systemctl reload nginx
            elif command -v nginx >/dev/null 2>&1; then
              sudo nginx -s reload
            fi

            curl -fsS http://127.0.0.1/api/cloud/status >/dev/null
            curl -fsS http://127.0.0.1/api/cache/status >/dev/null
